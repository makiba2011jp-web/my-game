<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語リスト確認 — 異世界英語</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 16px; background: #0a1226; color: #e8eefc;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "MS Gothic", system-ui, sans-serif; line-height: 1.5; }
  h1 { font-size: 20px; margin: 4px 0 6px; }
  .note { font-size: 12px; color: #9fb3d8; background: #11203f; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; }
  .bar { position: sticky; top: 0; background: #0a1226; padding: 8px 0; z-index: 5; }
  #search { width: 100%; box-sizing: border-box; font-size: 15px; padding: 9px 12px;
    border: 1px solid #2a3a6b; border-radius: 8px; background: #0c1830; color: #fff; }
  .tabs { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tab { font-size: 13px; color: #cde0ff; background: #1b2c52; border: 1px solid #2a3a6b;
    border-radius: 999px; padding: 5px 14px; cursor: pointer; }
  .tab.on { background: #ffd24a; color: #0a1226; border-color: #ffd24a; font-weight: bold; }
  h2 { font-size: 15px; margin: 22px 0 8px; padding: 5px 10px; background: #16284f; border-left: 4px solid #ffd24a; border-radius: 4px; }
  .row { display: flex; align-items: baseline; gap: 10px; padding: 7px 10px; border-bottom: 1px solid #18264a; }
  .row:nth-child(even) { background: #0e1a35; }
  .num { color: #5f7099; font-size: 11px; width: 28px; text-align: right; flex: none; }
  .en { color: #fff; font-weight: bold; font-size: 15px; min-width: 130px; flex: none;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .ja { color: #9fffcf; font-size: 14px; min-width: 110px; flex: none; }
  .wrong { color: #8a9bc0; font-size: 12px; }
  .count { color: #ffd24a; font-size: 12px; font-weight: normal; margin-left: 6px; }
  #empty { color: #ff9b9b; padding: 16px; display: none; }
  #err { color: #ff9b9b; background: #3a1414; padding: 10px; border-radius: 8px; display: none; }
</style>
</head>
<body>
<h1>📚 単語リスト確認ページ</h1>
<div class="note">
  <code>words.js</code> をそのまま読み込んで表示（常に最新）。バトルの4択は「正解＋誤答3つ」をシャッフルして出題します。<br>
  ※ <b>プレビューサーバー経由で開いてください</b>（例 <code>http://127.0.0.1:8123/words-view.html</code>）。ゲーム本体とは無関係。
</div>
<div id="err"></div>

<div class="bar">
  <input id="search" type="text" placeholder="🔍 英単語・意味で検索（例: apple / りんご / 増加）" autocomplete="off">
  <div class="tabs" id="tabs">
    <span class="tab on" data-lv="all">すべて</span>
    <span class="tab" data-lv="500">TOEIC 500</span>
    <span class="tab" data-lv="700">TOEIC 700</span>
    <span class="tab" data-lv="900">TOEIC 900</span>
  </div>
</div>

<div id="list"></div>
<div id="empty">該当する単語がありません。</div>

<script src="words.js"></script>
<script>
  let curLv = "all", curQ = "";
  const listEl = document.getElementById("list");
  const emptyEl = document.getElementById("empty");

  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  function render() {
    if (typeof WORD_DATA === "undefined") {
      document.getElementById("err").style.display = "block";
      document.getElementById("err").textContent =
        "words.js を読み込めませんでした。プレビューサーバー経由で開いてください: http://127.0.0.1:8123/words-view.html";
      return;
    }
    const levels = curLv === "all" ? [500, 700, 900] : [parseInt(curLv, 10)];
    const q = curQ.trim().toLowerCase();
    let html = "", total = 0;
    for (const lv of levels) {
      const arr = (WORD_DATA[lv] || []).filter((w) =>
        !q || w.en.toLowerCase().includes(q) || w.ja.includes(curQ.trim()) || w.wrong.some((x) => x.includes(curQ.trim())));
      if (!arr.length) continue;
      total += arr.length;
      html += `<h2>TOEIC ${lv}<span class="count">${arr.length}語</span></h2>`;
      arr.forEach((w, i) => {
        html += `<div class="row">` +
          `<span class="num">${i + 1}</span>` +
          `<span class="en">${esc(w.en)}</span>` +
          `<span class="ja">${esc(w.ja)}</span>` +
          `<span class="wrong">誤答: ${w.wrong.map(esc).join(" / ")}</span>` +
          `</div>`;
      });
    }
    listEl.innerHTML = html;
    emptyEl.style.display = total ? "none" : "block";
  }

  document.getElementById("search").addEventListener("input", (e) => { curQ = e.target.value; render(); });
  document.getElementById("tabs").addEventListener("click", (e) => {
    const t = e.target.closest(".tab"); if (!t) return;
    document.querySelectorAll(".tab").forEach((x) => x.classList.remove("on"));
    t.classList.add("on"); curLv = t.dataset.lv; render();
  });
  render();
</script>
</body>
</html>
