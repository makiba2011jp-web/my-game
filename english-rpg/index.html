<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>異世界英語クエスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrap">
    <!-- APIキー入力バー(常時表示) -->
    <div id="apikey-bar">
      <div class="key-line">
        <label for="apikey-field">Anthropic APIキー</label>
        <input id="apikey-field" type="password" placeholder="sk-ant-... を貼り付け" autocomplete="off" spellcheck="false" />
        <button id="apikey-clear" title="消去">✕</button>
      </div>
      <span id="apikey-status"></span>
      <span id="token-usage"></span>
    </div>

    <canvas id="game" width="480" height="480"></canvas>

    <!-- 画面上の情報パネル(Lv/目的/もちもの等)の表示/非表示トグル(PC:クリック/Hキー、スマホ:フィールドをタップ) -->
    <button id="ctrl-toggle">📊 情報パネルを表示</button>

    <!-- 操作ボタン類 -->
    <div id="controls">
    <!-- モバイル用十字キー(情報パネル表示ボタンの直下) -->
    <div id="dpad">
      <button class="dbtn" data-dir="up">▲</button>
      <div class="dpad-mid">
        <button class="dbtn" data-dir="left">◀</button>
        <button class="dbtn" data-dir="down">▼</button>
        <button class="dbtn" data-dir="right">▶</button>
      </div>
    </div>

    <!-- コトハにきく(コマンド) -->
    <button id="kotoha-btn">🧚 コトハにきく（Cキー）</button>

    <!-- オート戦闘トグル(フィールドで歩かず自動エンカウント) -->
    <button id="auto-btn">⚔ オート戦闘: OFF</button>

    <!-- 装備の付け替え -->
    <button id="equip-btn">🛡 そうび</button>

    <!-- 難易度切替(ゲーム途中でも変更可) -->
    <button id="level-btn">難易度: TOEIC 500</button>

    <!-- 効果音のON/OFF -->
    <button id="sfx-btn">🔔 効果音: ON</button>

    <!-- BGMのON/OFF -->
    <button id="bgm-btn">🎵 BGM: ON</button>

    <!-- セーブ(探索中のみ。自動セーブもあり) -->
    <button id="save-btn">💾 セーブする</button>

    <!-- 開発用: 目的ジャンプ -->
    <div id="dev-bar">
      <span>🛠 開発: 目的から開始</span>
      <button data-stage="0">①最初</button>
      <button data-stage="1">②町へ</button>
      <button data-stage="2">③聞込</button>
      <button data-stage="3">④売る</button>
      <button data-stage="4">⑤宿</button>
      <button data-stage="5">⑥登録</button>
      <button data-stage="6">⑦依頼</button>
      <button data-stage="7">⑧美容院</button>
      <button data-stage="8">⑨聞込</button>
      <button data-stage="9">⑩捕獲</button>
      <button data-stage="10">⑪食料</button>
      <button data-stage="11">⑫マグロ</button>
      <button data-stage="12">⑬届け</button>
      <button data-stage="13">⑭報告</button>
      <button data-stage="14">⑮ボード</button>
      <button data-stage="15">⑯ランク2</button>
      <button data-stage="16">⑰ギルド</button>
      <button data-stage="17">⑱遺跡碑文</button>
      <button data-stage="18">⑲ランク3</button>
      <button data-stage="19">⑳ギルド</button>
      <button data-stage="20">㉑氷碑文</button>
      <button data-stage="21">㉒ランク4</button>
      <button data-stage="22">㉓ギルド</button>
      <button data-stage="23">㉔炎碑文</button>
      <button data-stage="24">㉕ランク5</button>
      <button data-stage="25">㉖ギルド</button>
      <button data-stage="26">㉗塔祭壇</button>
      <button data-stage="27">㉘魔王城</button>
      <button id="dev-gold" title="開発: 所持金に10000G追加">💰+1万G</button>
      <button id="dev-gp" title="開発: ギルドポイント+120(ランクアップ確認用)">GP+120</button>
      <button id="dev-model" title="OpusとHaikuを切替">モデル:Opus 4.8</button>
    </div>
    </div><!-- /#controls -->

    <!-- 名前入力(オープニング) -->
    <div id="name-overlay">
      <div id="name-box">
        <div id="name-title">あなたの なまえは？</div>
        <input id="name-input" type="text" maxlength="6" placeholder="なまえを入力" autocomplete="off" spellcheck="false" />
        <button id="name-ok">この なまえで はじめる</button>
        <div id="name-hint">6文字まで（未入力なら「まきば」）</div>
      </div>
    </div>

    <!-- NPCとのAI英会話オーバーレイ -->
    <div id="chat-overlay">
      <div id="chat-window">
        <div id="chat-header">
          <span id="chat-npc-name">NPC</span>
          <div class="chat-head-btns">
            <button id="chat-help">🧚 コトハ</button>
            <button id="chat-key" title="APIキー設定">⚙</button>
            <button id="chat-close">× とじる</button>
          </div>
        </div>
        <div id="chat-apikey">
          <div class="key-title">Anthropic APIキーを入力</div>
          <p class="key-desc">開発・テスト用です。キーはこのブラウザ（localStorage）にだけ保存され、Anthropicへの直接リクエストにのみ使われます。</p>
          <input id="apikey-input" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
          <div class="key-row">
            <button id="apikey-save">保存して続ける</button>
            <button id="apikey-cancel">キャンセル</button>
          </div>
          <p class="key-note">キーは <a href="https://console.anthropic.com/" target="_blank" rel="noopener">console.anthropic.com</a> で取得できます。</p>
        </div>
        <div id="chat-log"></div>
        <div id="chat-tokens"></div>
        <div id="chat-inputbar">
          <input id="chat-input" type="text" placeholder="英語で話す… (Enterで送信)" autocomplete="off" />
          <button id="chat-send">話す</button>
        </div>
      </div>
    </div>
  </div>
  <script src="words.js"></script>
  <script src="words_dungeon.js"></script>
  <script src="words_dungeon2.js"></script>
  <script src="words_tower.js"></script>
  <script src="words_fire.js"></script>
  <script src="grammar.js"></script>
  <script src="quests.js"></script>
  <script src="voice.js"></script>
  <script src="sfx.js"></script>
  <!-- ?v= はキャッシュ対策。更新が反映されないときは数字を上げる -->
  <script src="bgm.js?v=6"></script>
  <script src="chat.js"></script>
  <script src="game.js?v=6"></script>
</body>
</html>
